server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Los archivos generados por Vite tienen hash en el nombre (ej.
    # index-Ab12cd.js): si el contenido cambia, el nombre cambia. Por eso
    # pueden cachearse "para siempre" sin riesgo de servir una version vieja.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html en cambio SIEMPRE debe revalidarse: es el que apunta a los
    # nombres con hash de arriba. Si el navegador lo cachea, un usuario que
    # recarga la pagina puede seguir viendo la version anterior de la app
    # (nombres de assets viejos) aunque el servidor ya tenga una nueva.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # CLAVE en una SPA: cualquier ruta (ej. /lobby, /juego/ABC123) debe
    # devolver index.html, para que el router de React la resuelva.
    # Sin esto, recargar en /lobby daria 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
